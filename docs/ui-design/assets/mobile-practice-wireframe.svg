<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Practice Wireframe</title>
  <desc id="desc">Wireframe for the mobile practice screen.</desc>
  <rect width="900" height="760" fill="#F8FAFC"/>
  <text x="48" y="54" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Practice Session</text>
  <text x="48" y="84" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748B">Portrait-first layout, no web sidebar, no marketing surface.</text>

  <g transform="translate(278,110)">
    <rect width="344" height="610" rx="32" fill="#111827"/>
    <rect x="14" y="14" width="316" height="582" rx="24" fill="#F8FAFC"/>
    <rect x="42" y="34" width="260" height="28" rx="14" fill="#111827" opacity="0.12"/>

    <g transform="translate(32,82)">
      <rect width="280" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Sprint</text>
      <text x="132" y="28" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">Review</text>
      <text x="222" y="28" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">History</text>
    </g>

    <g transform="translate(32,144)">
      <text x="0" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Mixed 5/20</text>
      <text x="198" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563EB">ELO 1118</text>
      <rect y="34" width="280" height="40" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="16" y="59" font-family="Inter, Arial, sans-serif" font-size="13" fill="#111827">0 / 15</text>
      <text x="122" y="59" font-family="Inter, Arial, sans-serif" font-size="13" fill="#111827">4:57</text>
      <text x="222" y="59" font-family="Inter, Arial, sans-serif" font-size="13" fill="#111827">0 mistakes</text>
    </g>

    <g transform="translate(32,244)">
      <rect width="280" height="280" rx="8" fill="#7B8794"/>
      <g>
        <rect width="70" height="70" fill="#E6E8EB"/>
        <rect x="140" width="70" height="70" fill="#E6E8EB"/>
        <rect x="70" y="70" width="70" height="70" fill="#E6E8EB"/>
        <rect x="210" y="70" width="70" height="70" fill="#E6E8EB"/>
        <rect y="140" width="70" height="70" fill="#E6E8EB"/>
        <rect x="140" y="140" width="70" height="70" fill="#E6E8EB"/>
        <rect x="70" y="210" width="70" height="70" fill="#E6E8EB"/>
        <rect x="210" y="210" width="70" height="70" fill="#E6E8EB"/>
      </g>
      <circle cx="210" cy="70" r="16" fill="#111827"/>
      <circle cx="70" cy="210" r="16" fill="#FFFFFF" stroke="#111827" stroke-width="2"/>
    </g>

    <g transform="translate(32,542)">
      <text x="0" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Find the best move for white.</text>
      <text x="0" y="40" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">Board interaction remains the primary input.</text>
    </g>
  </g>

  <g transform="translate(48,190)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Design notes</text>
    <text x="0" y="30" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">1. Session status stays fixed above board.</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">2. Board gets most of the vertical space.</text>
    <text x="0" y="82" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">3. No nested cards, no desktop nav.</text>
  </g>
</svg>
