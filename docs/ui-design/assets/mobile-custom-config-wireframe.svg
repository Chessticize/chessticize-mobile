<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Custom Sprint Configuration Wireframe</title>
  <desc id="desc">Wireframe for mobile custom sprint configuration.</desc>
  <rect width="900" height="760" fill="#F8FAFC"/>
  <text x="48" y="54" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Custom Sprint Setup</text>
  <text x="48" y="84" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748B">Compact controls with live summary and reusable presets.</text>

  <g transform="translate(278,110)">
    <rect width="344" height="610" rx="32" fill="#111827"/>
    <rect x="14" y="14" width="316" height="582" rx="24" fill="#F8FAFC"/>

    <g transform="translate(32,48)">
      <text x="0" y="18" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Custom Sprint</text>
      <text x="0" y="42" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">Build a reusable training format.</text>
    </g>

    <g transform="translate(32,112)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#64748B">Mode</text>
      <rect y="12" width="280" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="16" y="40" font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">Regular Puzzles</text>

      <text x="0" y="86" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#64748B">Theme</text>
      <rect y="98" width="280" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="16" y="126" font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">Mixed</text>

      <text x="0" y="172" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#64748B">Duration</text>
      <rect y="184" width="132" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="16" y="212" font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">10 min</text>

      <text x="148" y="172" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#64748B">Per Puzzle</text>
      <rect x="148" y="184" width="132" height="44" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="164" y="212" font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">20 sec</text>
    </g>

    <g transform="translate(32,372)">
      <rect width="280" height="78" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
      <text x="16" y="30" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">30 puzzles</text>
      <text x="16" y="54" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1D4ED8">ELO type: mixed 10/20</text>
    </g>

    <g transform="translate(32,474)">
      <rect width="280" height="54" rx="14" fill="#2563EB"/>
      <text x="82" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Start Sprint</text>
    </g>
  </g>

  <g transform="translate(48,190)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Design notes</text>
    <text x="0" y="30" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">1. Put setup in a focused screen or sheet.</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">2. Summary updates as controls change.</text>
    <text x="0" y="82" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">3. Previous configs live below, not beside.</text>
  </g>
</svg>
