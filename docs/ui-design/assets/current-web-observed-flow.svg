    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Settings</text>
    <text x="24" y="72" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748B">Observed: account links plus ELO controls.</text>
