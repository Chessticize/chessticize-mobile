<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Current Web Puzzle Sprint Observed Flow</title>
  <desc id="desc">Sanitized schematic of the current web Puzzle Sprint surfaces reviewed in Chrome.</desc>
  <rect width="1120" height="760" fill="#F8FAFC"/>
  <text x="48" y="56" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Current Web Flow Observed</text>
  <text x="48" y="88" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748B">Sanitized schematic based on Chrome review. Personal ELO, usernames, stats, and dates are intentionally omitted.</text>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g transform="translate(48,130)" filter="url(#shadow)">
    <rect width="312" height="250" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Puzzle Sprint Dashboard</text>
    <rect x="24" y="64" width="84" height="22" rx="11" fill="#E2E8F0"/>
    <rect x="118" y="64" width="84" height="22" rx="11" fill="#E2E8F0"/>
    <rect x="212" y="64" width="64" height="22" rx="11" fill="#E2E8F0"/>
    <rect x="24" y="106" width="264" height="42" rx="8" fill="#FFFBEB" stroke="#FED7AA"/>
    <text x="44" y="133" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#92400E">Standard Sprint</text>
    <rect x="24" y="158" width="264" height="42" rx="8" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="44" y="185" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">Arrow Duel</text>
    <rect x="24" y="210" width="264" height="24" rx="8" fill="#EFF6FF"/>
    <text x="44" y="227" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1D4ED8">Recent custom sprint rows</text>
  </g>

  <g transform="translate(404,130)" filter="url(#shadow)">
