      <rect x="156" y="116" width="42" height="27" fill="#F0D9B5"/>
      <rect x="114" y="143" width="42" height="27" fill="#F0D9B5"/>
      <rect x="198" y="143" width="42" height="27" fill="#F0D9B5"/>
      <rect x="72" y="170" width="42" height="27" fill="#F0D9B5"/>
