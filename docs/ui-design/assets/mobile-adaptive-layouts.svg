<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Adaptive Mobile Layouts</title>
  <desc id="desc">Responsive layout directions for compact portrait, compact landscape, and regular iPad viewports.</desc>
  <rect width="1200" height="780" fill="#F8FAFC"/>
  <text x="48" y="54" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Adaptive Layouts</text>
  <text x="48" y="84" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748B">The board stays primary while navigation and support panels move with available width and height.</text>

  <defs>
    <style>
      .label { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #111827; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 11px; fill: #64748B; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 10px; fill: #64748B; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .panel { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; }
      .accent { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1; }
      .blue { fill: #2563EB; }
      .green { fill: #16A34A; }
      .red { fill: #DC2626; }
    </style>
  </defs>

  <g transform="translate(48,126)">
    <text class="title" x="0" y="0">Compact Portrait</text>
    <text class="small" x="0" y="24">iPhone portrait, one-column shell</text>
    <rect x="0" y="48" width="244" height="560" rx="28" fill="#111827"/>
    <rect x="12" y="60" width="220" height="536" rx="20" fill="#F8FAFC"/>
    <rect x="28" y="82" width="188" height="32" rx="8" class="panel"/>
    <text class="label" x="42" y="103">Practice</text>
    <g transform="translate(28,130)">
      <rect width="188" height="46" rx="8" class="accent"/>
      <rect y="56" width="188" height="46" rx="8" class="panel"/>
      <rect y="112" width="188" height="46" rx="8" class="panel"/>
      <rect y="168" width="188" height="46" rx="8" class="panel"/>
      <text class="tiny" x="12" y="29">Mode list</text>
      <text class="tiny" x="12" y="85">Progress</text>
      <text class="tiny" x="12" y="141">Review strip</text>
      <text class="tiny" x="12" y="197">QA source</text>
    </g>
    <g transform="translate(28,370)">
      <rect width="188" height="38" rx="8" class="panel"/>
      <text class="tiny" x="12" y="24">Bottom tabs</text>
      <circle cx="42" cy="70" r="9" class="blue"/>
      <circle cx="82" cy="70" r="9" fill="#CBD5E1"/>
      <circle cx="122" cy="70" r="9" fill="#CBD5E1"/>
      <circle cx="162" cy="70" r="9" fill="#CBD5E1"/>
    </g>
    <text class="small" x="0" y="636">Use today: stacked scroll, bottom tab bar.</text>
  </g>

  <g transform="translate(356,126)">
    <text class="title" x="0" y="0">Compact Landscape</text>
    <text class="small" x="0" y="24">Future iPhone landscape, short height</text>
    <rect x="0" y="78" width="380" height="244" rx="26" fill="#111827"/>
    <rect x="12" y="90" width="356" height="220" rx="18" fill="#F8FAFC"/>
    <rect x="28" y="106" width="42" height="188" rx="10" class="panel"/>
    <circle cx="49" cy="136" r="8" class="blue"/>
    <circle cx="49" cy="176" r="8" fill="#CBD5E1"/>
    <circle cx="49" cy="216" r="8" fill="#CBD5E1"/>
    <circle cx="49" cy="256" r="8" fill="#CBD5E1"/>
    <g transform="translate(86,106)">
      <rect width="172" height="172" rx="8" fill="#7B8794"/>
      <g>
        <rect width="43" height="43" fill="#E6E8EB"/>
        <rect x="86" width="43" height="43" fill="#E6E8EB"/>
        <rect x="43" y="43" width="43" height="43" fill="#E6E8EB"/>
        <rect x="129" y="43" width="43" height="43" fill="#E6E8EB"/>
        <rect y="86" width="43" height="43" fill="#E6E8EB"/>
        <rect x="86" y="86" width="43" height="43" fill="#E6E8EB"/>
        <rect x="43" y="129" width="43" height="43" fill="#E6E8EB"/>
        <rect x="129" y="129" width="43" height="43" fill="#E6E8EB"/>
      </g>
      <line x1="43" y1="129" x2="129" y2="86" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
      <polygon points="129,86 111,83 119,101" fill="#2563EB"/>
      <rect y="184" width="172" height="18" rx="5" class="panel"/>
    </g>
    <g transform="translate(274,106)">
      <rect width="78" height="36" rx="8" class="panel"/>
      <rect y="48" width="78" height="62" rx="8" class="accent"/>
      <rect y="122" width="78" height="56" rx="8" class="panel"/>
      <text class="tiny" x="10" y="23">Status</text>
      <text class="tiny" x="10" y="80">Prompt</text>
      <text class="tiny" x="10" y="154">Actions</text>
    </g>
    <text class="small" x="0" y="360">Use rail nav outside sessions. During active play, board left/center and control rail right.</text>
  </g>

  <g transform="translate(48,545)">
    <rect width="680" height="122" rx="14" class="panel"/>
    <text class="label" x="20" y="34">Landscape active-session rule</text>
    <text class="small" x="20" y="60">Board size = min(board slot width, available height minus status/prompt chrome, max 560 on phone).</text>
    <text class="small" x="20" y="84">Prompt, score strip, and abandon/pause controls become a right rail; overflow scrolls inside the rail only.</text>
    <text class="small" x="20" y="108">No bottom tab bar in active sessions; no controls under the home indicator or Dynamic Island cutouts.</text>
  </g>

  <g transform="translate(780,126)">
    <text class="title" x="0" y="0">Regular Width / iPad</text>
    <text class="small" x="0" y="24">Two-pane and three-pane layouts</text>
    <rect x="0" y="48" width="360" height="520" rx="28" fill="#111827"/>
    <rect x="12" y="60" width="336" height="496" rx="18" fill="#F8FAFC"/>
    <rect x="28" y="82" width="62" height="452" rx="12" class="panel"/>
    <circle cx="59" cy="122" r="10" class="blue"/>
    <circle cx="59" cy="178" r="10" fill="#CBD5E1"/>
    <circle cx="59" cy="234" r="10" fill="#CBD5E1"/>
    <circle cx="59" cy="290" r="10" fill="#CBD5E1"/>
    <g transform="translate(110,82)">
      <rect width="132" height="132" rx="8" fill="#7B8794"/>
      <g>
        <rect width="33" height="33" fill="#E6E8EB"/>
        <rect x="66" width="33" height="33" fill="#E6E8EB"/>
        <rect x="33" y="33" width="33" height="33" fill="#E6E8EB"/>
        <rect x="99" y="33" width="33" height="33" fill="#E6E8EB"/>
        <rect y="66" width="33" height="33" fill="#E6E8EB"/>
        <rect x="66" y="66" width="33" height="33" fill="#E6E8EB"/>
        <rect x="33" y="99" width="33" height="33" fill="#E6E8EB"/>
        <rect x="99" y="99" width="33" height="33" fill="#E6E8EB"/>
      </g>
      <rect y="148" width="132" height="36" rx="8" class="panel"/>
      <rect y="198" width="132" height="72" rx="8" class="panel"/>
    </g>
    <g transform="translate(260,82)">
      <rect width="70" height="60" rx="8" class="accent"/>
      <rect y="74" width="70" height="90" rx="8" class="panel"/>
      <rect y="178" width="70" height="90" rx="8" class="panel"/>
      <text class="tiny" x="10" y="34">Queue</text>
      <text class="tiny" x="10" y="116">Lines</text>
      <text class="tiny" x="10" y="220">History</text>
    </g>
    <g transform="translate(110,380)">
      <rect width="220" height="128" rx="12" class="panel"/>
      <text class="tiny" x="14" y="28">Practice dashboard uses two columns.</text>
      <text class="tiny" x="14" y="54">Review/analysis keeps board plus inspector.</text>
      <text class="tiny" x="14" y="80">History and Settings use split detail.</text>
    </g>
    <text class="small" x="0" y="606">Regular width gets a persistent side rail and constrained content max width.</text>
  </g>
</svg>
