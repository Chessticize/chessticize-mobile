name: Publish Play-generated Android APK

on:
  workflow_dispatch:
    inputs:
      public_version:
        description: Canonical public version already published through Play
        required: true
        type: string
      version_code:
        description: Canonical Android build number already verified on device
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: mirror-play-apk-${{ inputs.public_version }}-${{ inputs.version_code }}
  cancel-in-progress: false

jobs:
  mirror-play-apk:
    name: Mirror Play-signed universal APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Resolve and checkout the exact canonical tag
        id: candidate
        env:
          PUBLIC_VERSION: ${{ inputs.public_version }}
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          candidate_sha="$(bash apps/mobile/scripts/resolve-android-release-candidate-commit.sh \
            "$PUBLIC_VERSION" "$VERSION_CODE")"
          tag_name="$(node -e '
            const { canonicalAndroidSourceTag } = require("./apps/mobile/scripts/android-play-release");
            process.stdout.write(canonicalAndroidSourceTag(process.argv[1], Number(process.argv[2])));
          ' "$PUBLIC_VERSION" "$VERSION_CODE")"
          git checkout --detach "$candidate_sha"
          echo "sha=$candidate_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install APK inspection tools only
        run: sdkmanager "build-tools;36.0.0"

      - name: Download the already-published corresponding-source manifest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.candidate.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/source"
          gh release download "$TAG_NAME" \
            --pattern android-source-manifest.json \
            --dir "$RUNNER_TEMP/source"

      - name: Authenticate to Google Play with workload identity
        id: play-auth-wif
        if: vars.GOOGLE_WORKLOAD_IDENTITY_PROVIDER != ''
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GOOGLE_PLAY_PUBLISHER_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Authenticate to Google Play with the protected fallback credential
        id: play-auth-key
        if: vars.GOOGLE_WORKLOAD_IDENTITY_PROVIDER == ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.ANDROID_PUBLISHER_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Require the stable Play app-signing identity
        env:
          APP_SIGNING_CERT_SHA256: ${{ vars.ANDROID_PLAY_APP_SIGNING_CERT_SHA256 }}
        run: test -n "$APP_SIGNING_CERT_SHA256"

      - name: Download, identity-check, and publish the Play-generated APK
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PLAY_ACCESS_TOKEN: ${{ steps.play-auth-wif.outputs.access_token || steps.play-auth-key.outputs.access_token }}
          ANDROID_PLAY_APP_SIGNING_CERT_SHA256: ${{ vars.ANDROID_PLAY_APP_SIGNING_CERT_SHA256 }}
        run: |
          mkdir -p "$RUNNER_TEMP/apk-mirror"
          node apps/mobile/scripts/android-github-release-cli.js \
            --operation mirror-play-apk \
            --public-version "${{ inputs.public_version }}" \
            --version-code "${{ inputs.version_code }}" \
            --source-manifest "$RUNNER_TEMP/source/android-source-manifest.json" \
            --output-dir "$RUNNER_TEMP/apk-mirror"

      - name: Retain the small mirror receipt
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-mirror-${{ steps.candidate.outputs.sha }}
          if-no-files-found: error
          retention-days: 30
          path: ${{ runner.temp }}/apk-mirror/android-apk-mirror-evidence.json
