name: Development Process

on:
  pull_request:
    paths:
      - ".codex/skills/chessticize-mobile-dev-loop/**"
      - ".codex/skills/chessticize-mobile-local-e2e/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/**"
      - "AGENTS.md"
      - "docs/APP_STORE_UPLOAD.md"
      - "docs/RELEASE_SOURCE_POLICY.md"
      - "docs/TESTFLIGHT_QA.md"
      - "docs/TESTING_ARCHITECTURE.md"
      - "docs/agents/**"
      - "package.json"
      - "scripts/validate-development-process.mjs"
  push:
    branches:
      - main
    paths:
      - ".codex/skills/chessticize-mobile-dev-loop/**"
      - ".codex/skills/chessticize-mobile-local-e2e/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/**"
      - "AGENTS.md"
      - "docs/APP_STORE_UPLOAD.md"
      - "docs/RELEASE_SOURCE_POLICY.md"
      - "docs/TESTFLIGHT_QA.md"
      - "docs/TESTING_ARCHITECTURE.md"
      - "docs/agents/**"
      - "package.json"
      - "scripts/validate-development-process.mjs"

permissions:
  contents: read

concurrency:
  group: process-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Validate development process
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x

      - name: Validate process policy and automation
        run: node scripts/validate-development-process.mjs
