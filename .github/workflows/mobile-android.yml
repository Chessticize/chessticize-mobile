name: Mobile Android

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android build baseline
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android emulator runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpulse0

      - name: Install pinned Android build tools
        run: pnpm mobile:install:android-sdk

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache core puzzle pack
        uses: actions/cache@v4
        with:
          path: fixtures/puzzles/bundled-core-pack.sqlite
          key: core-pack-${{ hashFiles('fixtures/puzzles/bundled-core-pack.manifest.json') }}

      - name: Fetch core puzzle pack
        run: pnpm fetch:core-pack

      - name: Android environment doctor
        run: pnpm mobile:doctor:android

      - name: Mobile typecheck
        run: pnpm mobile:typecheck

      - name: Android backup policy unit tests
        working-directory: apps/mobile/android
        run: >-
          ./gradlew :app:testDebugUnitTest
          --tests com.chessticize.mobile.backup.ProgressBackupPolicyTest
          --no-daemon

      - name: Verify explicit and aggregate release tasks fail closed
        working-directory: apps/mobile/android
        run: |
          verify_release_task_fails_closed() {
            local release_task="$1"
            set +e
            release_output="$(./gradlew "$release_task" --no-daemon 2>&1)"
            release_status=$?
            set -e
            echo "$release_output"
            if [ "$release_status" -eq 0 ]; then
              echo "$release_task unexpectedly succeeded without production signing material." >&2
              exit 1
            fi
            grep -F "Production Android signing material is required for release packaging." <<<"$release_output"
          }

          verify_release_task_fails_closed :app:bundleRelease
          verify_release_task_fails_closed :app:assemble

      - name: Build self-contained E2E app and Detox test APK
        run: pnpm mobile:e2e:build:android

      - name: Verify packaged native ABIs
        run: pnpm mobile:verify:android:abis

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-practice-apks
          if-no-files-found: error
          path: |
            apps/mobile/android/app/build/outputs/apk/e2e/app-e2e.apk
            apps/mobile/android/app/build/outputs/apk/androidTest/e2e/app-e2e-androidTest.apk

  android-launch:
    name: Android offline practice API ${{ matrix.api-level }}
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        api-level: ${{ fromJSON(github.event_name == 'schedule' && '[36]' || '[24,36]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Launch through the public UI
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: >-
            pnpm mobile:validate:android:matrix -- --api-level "${{ matrix.api-level }}"
            --output "apps/mobile/artifacts/android-validation/api-${{ matrix.api-level }}.json"
        env:
          DETOX_ANDROID_DEVICE: emulator-5554
          ANDROID_VALIDATION_COMMIT_SHA: ${{ github.sha }}
          ANDROID_VALIDATION_BUILD_RESULT: success
          ANDROID_VALIDATION_DEVICE_ABI: x86_64
          ANDROID_VALIDATION_DEVICE_PROFILE: pixel_2

      - name: Upload exact-head Android matrix evidence
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-validation-api-${{ matrix.api-level }}
          if-no-files-found: error
          path: apps/mobile/artifacts/android-validation/

      - name: Upload Android launch failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-launch-diagnostics-api-${{ matrix.api-level }}
          if-no-files-found: warn
          path: apps/mobile/artifacts/android-ui/

      - name: Upload Android review reminder evidence
        if: always() && matrix.api-level == 36
        uses: actions/upload-artifact@v4
        with:
          name: android-review-reminder-evidence
          if-no-files-found: error
          path: apps/mobile/artifacts/android-review-reminders/

  android-adaptive-layout:
    name: Android adaptive public UI
    if: github.event_name == 'workflow_dispatch'
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Capture phone, tablet, foldable, and ChromeOS evidence
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: apps/mobile/scripts/android-adaptive-layout-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android adaptive evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-adaptive-layout-evidence
          if-no-files-found: error
          path: apps/mobile/artifacts/android-adaptive-layout/

      - name: Upload Android adaptive failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-adaptive-layout-diagnostics
          if-no-files-found: warn
          path: apps/mobile/artifacts/android-ui/

  android-progress-backup:
    name: Android Progress Backup restore evidence
    if: github.event_name == 'workflow_dispatch'
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Record exact-head validation context
        run: |
          mkdir -p apps/mobile/artifacts/android-progress-backup
          git status --porcelain --untracked-files=no > apps/mobile/artifacts/android-progress-backup/tracked-worktree-before.txt
          test ! -s apps/mobile/artifacts/android-progress-backup/tracked-worktree-before.txt
          {
            echo "commit-sha=$GITHUB_SHA"
            echo "build-result=success (android-build dependency)"
            echo "validation-scope=targeted Android encrypted-cloud and D2D clean-install restore"
            echo "commands=android-standard-practice; quota guard; cloud-encrypted restore; current-progress restore assertion; released-fixture seed; quota guard; device-transfer restore; released-fixture migration assertion"
          } > apps/mobile/artifacts/android-progress-backup/context.txt

      - name: Exercise encrypted cloud and D2D restore through public UI
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            apps/mobile/scripts/android-progress-backup-restore-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android Progress Backup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-progress-backup-evidence
          if-no-files-found: error
          path: apps/mobile/artifacts/android-progress-backup

  android-progress-backup-policy-api24:
    name: Android Progress Backup policy API 24
    if: github.event_name == 'workflow_dispatch'
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Exercise framework backup policy and archive selection
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 24
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: apps/mobile/scripts/android-progress-backup-policy-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android Progress Backup policy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-progress-backup-policy-api-24
          if-no-files-found: error
          path: apps/mobile/artifacts/android-progress-backup-policy/api-24

  android-progress-backup-policy-api36:
    name: Android Progress Backup policy API 36
    if: github.event_name == 'workflow_dispatch'
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Exercise framework backup policy and archive selection
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: apps/mobile/scripts/android-progress-backup-policy-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android Progress Backup policy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-progress-backup-policy-api-36
          if-no-files-found: error
          path: apps/mobile/artifacts/android-progress-backup-policy/api-36

  android-progress-backup-policy-api30:
    name: Android Progress Backup policy API 30
    if: github.event_name == 'workflow_dispatch'
    needs:
      - android-build
      - android-progress-backup-policy-api36
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Download API 36 OS archive evidence
        uses: actions/download-artifact@v4
        with:
          name: android-progress-backup-policy-api-36
          path: apps/mobile/artifacts/android-progress-backup-policy-source/api-36

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Exercise framework backup policy and inherited restore
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: apps/mobile/scripts/android-progress-backup-policy-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554
          ANDROID_BACKUP_API36_SOURCE_DIR: apps/mobile/artifacts/android-progress-backup-policy-source/api-36

      - name: Upload Android Progress Backup policy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-progress-backup-policy-api-30
          if-no-files-found: error
          path: apps/mobile/artifacts/android-progress-backup-policy/api-30
