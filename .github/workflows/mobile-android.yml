name: Mobile Android

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android build baseline
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android emulator runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpulse0

      - name: Install pinned Android build tools
        run: pnpm mobile:install:android-sdk

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache core puzzle pack
        uses: actions/cache@v4
        with:
          path: fixtures/puzzles/bundled-core-pack.sqlite
          key: core-pack-${{ hashFiles('fixtures/puzzles/bundled-core-pack.manifest.json') }}

      - name: Fetch core puzzle pack
        run: pnpm fetch:core-pack

      - name: Android environment doctor
        run: pnpm mobile:doctor:android

      - name: Mobile typecheck
        run: pnpm mobile:typecheck

      - name: Verify explicit and aggregate release tasks fail closed
        working-directory: apps/mobile/android
        run: |
          verify_release_task_fails_closed() {
            local release_task="$1"
            set +e
            release_output="$(./gradlew "$release_task" --no-daemon 2>&1)"
            release_status=$?
            set -e
            echo "$release_output"
            if [ "$release_status" -eq 0 ]; then
              echo "$release_task unexpectedly succeeded without production signing material." >&2
              exit 1
            fi
            grep -F "Production Android signing material is required for release packaging." <<<"$release_output"
          }

          verify_release_task_fails_closed :app:bundleRelease
          verify_release_task_fails_closed :app:assemble

      - name: Build self-contained E2E app and Detox test APK
        run: pnpm mobile:e2e:build:android

      - name: Verify packaged native ABIs
        run: pnpm mobile:verify:android:abis

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-practice-apks
          if-no-files-found: error
          path: |
            apps/mobile/android/app/build/outputs/apk/e2e/app-e2e.apk
            apps/mobile/android/app/build/outputs/apk/androidTest/e2e/app-e2e-androidTest.apk

  android-launch:
    name: Android offline practice API ${{ matrix.api-level }}
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        api-level: [24, 36]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Launch through the public UI
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            apps/mobile/scripts/prepare-android-offline-e2e.sh
            DETOX_ACTIVE_SUITE=android-launch pnpm mobile:e2e:test:android:ci
            DETOX_ACTIVE_SUITE=android-standard-practice pnpm mobile:e2e:test:android:ci
            DETOX_ACTIVE_SUITE=android-migration pnpm mobile:e2e:test:android:ci
            if [ "${{ matrix.api-level }}" = "36" ]; then DETOX_ACTIVE_SUITE=android-stockfish pnpm mobile:e2e:test:android:ci; fi
            if [ "${{ matrix.api-level }}" = "36" ]; then DETOX_ACTIVE_SUITE=flows pnpm mobile:e2e:test:android:ci; fi
            if [ "${{ matrix.api-level }}" = "36" ]; then DETOX_ACTIVE_SUITE=practice pnpm mobile:e2e:test:android:ci; fi
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android launch failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-launch-diagnostics-api-${{ matrix.api-level }}
          if-no-files-found: warn
          path: apps/mobile/artifacts/android-ui/

  android-progress-backup:
    name: Android Progress Backup restore evidence
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-practice-apks
          path: apps/mobile/android/app/build/outputs/apk

      - name: Enable KVM acceleration
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Record exact-head validation context
        run: |
          mkdir -p apps/mobile/artifacts/android-progress-backup
          git status --porcelain --untracked-files=no > apps/mobile/artifacts/android-progress-backup/tracked-worktree-before.txt
          test ! -s apps/mobile/artifacts/android-progress-backup/tracked-worktree-before.txt
          {
            echo "commit-sha=$GITHUB_SHA"
            echo "build-result=success (android-build dependency)"
            echo "validation-scope=targeted Android encrypted-cloud and D2D clean-install restore"
            echo "commands=android-standard-practice; quota guard; cloud-encrypted restore; current-progress restore assertion; released-fixture seed; quota guard; device-transfer restore; released-fixture migration assertion"
          } > apps/mobile/artifacts/android-progress-backup/context.txt

      - name: Exercise encrypted cloud and D2D restore through public UI
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_2
          ram-size: 4096M
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            apps/mobile/scripts/android-progress-backup-restore-evidence.sh
        env:
          DETOX_ANDROID_DEVICE: emulator-5554

      - name: Upload Android Progress Backup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-progress-backup-evidence
          if-no-files-found: error
          path: apps/mobile/artifacts/android-progress-backup
