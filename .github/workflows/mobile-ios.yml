name: Mobile iOS

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/mobile-ios.yml"
      - "apps/mobile/**"
      - "fixtures/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"

permissions:
  contents: read

concurrency:
  group: mobile-ios-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  mobile-checks:
    name: Mobile JS checks
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache core puzzle pack
        uses: actions/cache@v4
        with:
          path: fixtures/puzzles/bundled-core-pack.sqlite
          key: core-pack-${{ hashFiles('fixtures/puzzles/bundled-core-pack.manifest.json') }}

      - name: Fetch core puzzle pack
        run: pnpm fetch:core-pack

      - name: Mobile typecheck
        run: pnpm mobile:typecheck

      - name: Mobile component tests
        run: pnpm mobile:test

  detox-ios:
    name: Detox iOS (${{ matrix.suite }})
    # Draft PRs skip the expensive simulator build; mark the PR ready for
    # review (or dispatch manually) to run the full Detox suite.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    # macos-latest started resolving to macOS 26 in July 2026, where the first
    # Detox launch can remain busy until the smoke test times out. Keep the
    # release gate on the supported macOS 15 runner until Detox is qualified on
    # macOS 26.
    runs-on: macos-15
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        suite: [flows, practice]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm

      - name: Show Xcode
        id: xcode
        run: |
          xcodebuild -version
          xcode_cache_key="$(xcodebuild -version | shasum -a 256 | awk '{ print $1 }')"
          echo "cache-key=$xcode_cache_key" >> "$GITHUB_OUTPUT"

      - name: Cache Detox iOS framework
        uses: actions/cache@v4
        with:
          path: ~/Library/Detox/ios
          key: detox-ios-${{ runner.os }}-${{ steps.xcode.outputs.cache-key }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            detox-ios-${{ runner.os }}-${{ steps.xcode.outputs.cache-key }}-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache core puzzle pack
        uses: actions/cache@v4
        with:
          path: fixtures/puzzles/bundled-core-pack.sqlite
          key: core-pack-${{ hashFiles('fixtures/puzzles/bundled-core-pack.manifest.json') }}

      - name: Fetch core puzzle pack
        run: pnpm fetch:core-pack

      - name: Install Detox iOS utilities
        run: |
          brew tap wix/brew
          brew trust --formula wix/brew/applesimutils
          brew install applesimutils

      - name: Select available iOS simulator
        run: |
          set -euo pipefail
          available="$(xcrun simctl list devices available)"
          echo "$available"

          for device in "iPhone 17" "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15"; do
            if grep -q "^[[:space:]]*$device (" <<<"$available"; then
              echo "DETOX_IOS_DEVICE=$device" >> "$GITHUB_ENV"
              echo "Selected Detox simulator: $device"
              exit 0
            fi
          done

          fallback="$(awk -F ' \\(' '/^[[:space:]]+iPhone / { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1; exit }' <<<"$available")"
          if [ -z "$fallback" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi

          echo "DETOX_IOS_DEVICE=$fallback" >> "$GITHUB_ENV"
          echo "Selected Detox simulator: $fallback"

      - name: Setup system Ruby Bundler
        run: |
          /usr/bin/ruby --version
          /usr/bin/gem install --user-install bundler -v 2.4.22
          ruby_user_bin="$(/usr/bin/ruby -rrubygems -e 'puts Gem.user_dir + "/bin"')"
          echo "$ruby_user_bin" >> "$GITHUB_PATH"
          "$ruby_user_bin/bundle" _2.4.22_ --version

      - name: Install Ruby dependencies
        working-directory: apps/mobile
        run: bundle _2.4.22_ install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/ios/Pods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: iOS environment doctor
        run: pnpm mobile:doctor:ios

      - name: Build iOS simulator app
        run: pnpm mobile:e2e:build:ios

      - name: Boot Detox simulator
        run: |
          xcrun simctl boot "$DETOX_IOS_DEVICE" || true
          xcrun simctl bootstatus "$DETOX_IOS_DEVICE" -b

      - name: Run Detox iOS E2E suite
        working-directory: apps/mobile
        env:
          DETOX_ACTIVE_SUITE: ${{ matrix.suite }}
          DETOX_MAX_WORKERS: "1"
        run: ./node_modules/.bin/detox test --configuration ios.sim.debug --cleanup
