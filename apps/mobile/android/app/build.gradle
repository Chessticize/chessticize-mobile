import groovy.json.JsonSlurper
import org.gradle.api.file.ConfigurableFileCollection
import org.gradle.api.file.DirectoryProperty
import org.gradle.api.file.FileSystemOperations
import org.gradle.api.file.RegularFileProperty
import org.gradle.api.tasks.InputFile
import org.gradle.api.tasks.InputFiles
import org.gradle.api.tasks.OutputDirectory
import org.gradle.api.tasks.PathSensitive
import org.gradle.api.tasks.PathSensitivity
import org.gradle.api.tasks.TaskAction

import javax.inject.Inject

abstract class GenerateChessticizeAssets extends DefaultTask {
    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getPuzzlePack()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getNnueFiles()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getStockfishManifest()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getProjectLicense()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getThirdPartyNotices()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getStockfishCopying()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getStockfishAuthors()

    @OutputDirectory
    abstract DirectoryProperty getOutputDirectory()

    @Inject
    abstract FileSystemOperations getFileSystemOperations()

    @TaskAction
    void generateAssets() {
        def missingNetworks = nnueFiles.files.findAll { source -> !source.isFile() }
        if (!missingNetworks.isEmpty()) {
            throw new GradleException(
                "Canonical Stockfish NNUE assets are missing: ${missingNetworks.join(', ')}"
            )
        }

        fileSystemOperations.sync { spec ->
            spec.into(outputDirectory)
            spec.from(puzzlePack.get().asFile) {
                into "puzzle-packs"
            }
            spec.from(nnueFiles) {
                into "stockfish"
            }
            spec.from(stockfishManifest.get().asFile) {
                into "stockfish"
            }
            spec.from(projectLicense.get().asFile) {
                into "licenses"
            }
            spec.from(thirdPartyNotices.get().asFile) {
                into "licenses"
            }
            spec.from(stockfishCopying.get().asFile) {
                into "licenses/stockfish"
                rename { "COPYING.txt" }
            }
            spec.from(stockfishAuthors.get().asFile) {
                into "licenses/stockfish"
            }
        }
    }
}

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def releaseSigningValue = { String environmentName, String propertyName ->
    def value = System.getenv(environmentName) ?: findProperty(propertyName)
    value == null ? null : value.toString()
}
def releaseSigning = [
    storeFile: releaseSigningValue("CHESSTICIZE_ANDROID_RELEASE_STORE_FILE", "chessticizeReleaseStoreFile"),
    storePassword: releaseSigningValue("CHESSTICIZE_ANDROID_RELEASE_STORE_PASSWORD", "chessticizeReleaseStorePassword"),
    keyAlias: releaseSigningValue("CHESSTICIZE_ANDROID_RELEASE_KEY_ALIAS", "chessticizeReleaseKeyAlias"),
    keyPassword: releaseSigningValue("CHESSTICIZE_ANDROID_RELEASE_KEY_PASSWORD", "chessticizeReleaseKeyPassword")
]
def missingReleaseSigningValues = releaseSigning.findAll { _, value -> value == null || value.trim().isEmpty() }.keySet()
def releaseSigningConfigured = missingReleaseSigningValues.isEmpty() && file(releaseSigning.storeFile).isFile()
def appProjectPath = project.path
def releaseVersionFile = file("$rootDir/../release-version.json")
if (!releaseVersionFile.isFile()) {
    throw new GradleException("Canonical mobile release version is missing: ${releaseVersionFile}")
}
def releaseVersion = new JsonSlurper().parse(releaseVersionFile)
if (releaseVersion.schemaVersion != 1 ||
    !(releaseVersion.publicVersion instanceof String) ||
    !(releaseVersion.publicVersion ==~ /[0-9]+\.[0-9]+(\.[0-9]+)?/) ||
    !(releaseVersion.androidVersionCode instanceof Number) ||
    releaseVersion.androidVersionCode.intValue() < 1) {
    throw new GradleException("apps/mobile/release-version.json is invalid")
}

def validateReleaseSigning = {
    if (!missingReleaseSigningValues.isEmpty()) {
        throw new GradleException(
            "Production Android signing material is required for release packaging. " +
            "Missing: ${missingReleaseSigningValues.sort().join(', ')}. " +
            "Set the CHESSTICIZE_ANDROID_RELEASE_* environment variables or matching Gradle properties."
        )
    }

    if (!file(releaseSigning.storeFile).isFile()) {
        throw new GradleException(
            "Production Android signing keystore does not exist: ${releaseSigning.storeFile}"
        )
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def releasePackagingRequested = taskGraph.allTasks.any { task ->
        task.project.path == appProjectPath && (
            task.name == "assembleRelease" ||
            task.name == "bundleRelease" ||
            task.name.startsWith("packageRelease")
        )
    }

    if (releasePackagingRequested) {
        validateReleaseSigning()
    }
}

def supportedAndroidAbis = findProperty("reactNativeArchitectures")
    ?.toString()
    ?.split(",")
    ?.collect { abi -> abi.trim() }
    ?.findAll { abi -> !abi.isEmpty() }

if (!supportedAndroidAbis) {
    throw new GradleException("reactNativeArchitectures must declare at least one supported Android ABI.")
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    // E2E inherits debug signing and native behavior but deliberately bundles
    // JavaScript so the installed APK can run with Metro and networking off.
    debuggableVariants = ["debug"]
    // pnpm keeps React Native's compiler dependency in its virtual store. A
    // direct mobile dependency gives Gradle one stable cross-platform path.
    hermesCommand = "$rootDir/../node_modules/hermes-compiler/hermesc/%OS-BIN%/hermesc"
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'
def puzzlePackSource = file("$rootDir/../../../fixtures/puzzles/bundled-core-pack.sqlite")
def stockfishArtifactsFile = file("$rootDir/../stockfish-artifacts.json")
def stockfishArtifacts = new JsonSlurper().parse(stockfishArtifactsFile)
def stockfishRoot = file("$rootDir/../${stockfishArtifacts.root}")
def stockfishNnueFiles = stockfishArtifacts.nnue.collect { relativePath ->
    file("$stockfishRoot/$relativePath")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.chessticize.mobile"
    defaultConfig {
        applicationId "com.chessticize.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode releaseVersion.androidVersionCode
        versionName releaseVersion.publicVersion
        testBuildType System.getProperty("testBuildType", "debug")
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters(*supportedAndroidAbis)
        }
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }
    externalNativeBuild {
        cmake {
            path file("src/main/cpp/CMakeLists.txt")
            version "3.22.1"
        }
    }
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        if (releaseSigningConfigured) {
            release {
                storeFile file(releaseSigning.storeFile)
                storePassword releaseSigning.storePassword
                keyAlias releaseSigning.keyAlias
                keyPassword releaseSigning.keyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        e2e {
            initWith debug
            matchingFallbacks = ["debug"]
            manifestPlaceholders = [usesCleartextTraffic: false]
        }
        release {
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
            ndk {
                debugSymbolLevel 'FULL'
            }
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            proguardFile "${rootProject.projectDir}/../node_modules/detox/android/detox/proguard-rules-app.pro"
        }
    }
}

androidComponents {
    onVariants(selector().all()) { variant ->
        def generatedAssets = tasks.register(
            "generate${variant.name.capitalize()}ChessticizeAssets",
            GenerateChessticizeAssets
        ) {
            puzzlePack.set(puzzlePackSource)
            nnueFiles.from(stockfishNnueFiles)
            stockfishManifest.set(stockfishArtifactsFile)
            projectLicense.set(file("$rootDir/../../../LICENSE"))
            thirdPartyNotices.set(file("$rootDir/../../../THIRD_PARTY_NOTICES.md"))
            stockfishCopying.set(file("$stockfishRoot/Copying.txt"))
            stockfishAuthors.set(file("$stockfishRoot/AUTHORS"))
            outputDirectory.set(
                layout.buildDirectory.dir("generated/assets/chessticize/${variant.name}")
            )
        }
        variant.sources.assets.addGeneratedSourceDirectory(generatedAssets) { task ->
            task.outputDirectory
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("androidx.appcompat:appcompat:1.7.1")
    testImplementation("junit:junit:4.13.2")
    androidTestImplementation("com.wix:detox:+")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
