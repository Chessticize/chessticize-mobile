buildscript {
    ext {
        buildToolsVersion = property("chessticizeBuildTools").toString()
        minSdkVersion = property("chessticizeMinSdk").toString().toInteger()
        compileSdkVersion = property("chessticizeCompileSdk").toString().toInteger()
        targetSdkVersion = property("chessticizeTargetSdk").toString().toInteger()
        ndkVersion = property("chessticizeNdk").toString()
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
            url("$rootDir/../node_modules/detox/Detox-android")
        }
    }
}
